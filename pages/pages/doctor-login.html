<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Login | PharmaLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 500: '#14b8a6', 600: '#0d9488' } } } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-50" data-page="doctor-auth">
  <main class="relative min-h-screen overflow-hidden">
    <div class="absolute inset-0 hero-mesh opacity-80"></div>
    <div class="relative mx-auto grid min-h-screen max-w-6xl items-center gap-10 px-6 py-10 lg:grid-cols-[1fr_440px] lg:px-8">
      <section class="space-y-6">
        <a href="../index.html" class="inline-flex items-center gap-3 rounded-full border border-white/10 bg-white/5 px-4 py-2 backdrop-blur-xl">
          <span class="flex h-10 w-10 items-center justify-center rounded-2xl bg-gradient-to-br from-emerald-300 to-cyan-300 font-bold text-slate-950">P</span>
          <span class="text-sm font-medium">Back to PharmaLink</span>
        </a>
        <div class="space-y-5">
          <p class="inline-flex rounded-full bg-cyan-400/10 px-4 py-2 text-sm text-cyan-100">Doctor-only access</p>
          <h1 class="text-5xl font-semibold leading-tight tracking-tight">Manage your availability and consultation slots.</h1>
          <p class="text-lg leading-8 text-slate-300">This portal is reserved for doctor accounts. Patient accounts should use the main login page.</p>
        </div>
      </section>
      <section class="rounded-[2rem] border border-white/10 bg-white/10 p-6 shadow-2xl backdrop-blur-2xl">
        <div class="mb-5 grid grid-cols-2 rounded-full border border-white/10 bg-slate-900/30 p-1">
          <button type="button" class="auth-tab active rounded-full px-4 py-2 text-sm font-medium" data-doctor-auth-tab="login">Doctor Login</button>
          <button type="button" class="auth-tab rounded-full px-4 py-2 text-sm font-medium" data-doctor-auth-tab="signup">Doctor Signup</button>
        </div>

        <form id="doctor-login-form" data-doctor-auth-form="login" class="space-y-4">
          <div><label class="mb-2 block text-sm text-slate-300" for="doctor-email">Doctor email</label><input id="doctor-email" name="email" type="email" required class="form-input" placeholder="doctor@example.com"></div>
          <div><label class="mb-2 block text-sm text-slate-300" for="doctor-password">Password</label><input id="doctor-password" name="password" type="password" required class="form-input" placeholder="Enter your password"></div>
          <button type="submit" class="btn-primary w-full justify-center">Login as doctor</button>
        </form>

        <form id="doctor-signup-form" data-doctor-auth-form="signup" class="hidden space-y-4">
          <div><label class="mb-2 block text-sm text-slate-300" for="doctor-signup-name">Doctor name</label><input id="doctor-signup-name" name="name" type="text" required class="form-input" placeholder="Dr. Priyanshi"></div>
          <div><label class="mb-2 block text-sm text-slate-300" for="doctor-signup-specialization">Specialization</label><input id="doctor-signup-specialization" name="specialization" type="text" required class="form-input" placeholder="Gynecologist"></div>
          <div><label class="mb-2 block text-sm text-slate-300" for="doctor-signup-city">City</label><input id="doctor-signup-city" name="city" type="text" required class="form-input" placeholder="Vadodara"></div>
          <div><label class="mb-2 block text-sm text-slate-300" for="doctor-signup-fees">Consultation fee (INR)</label><input id="doctor-signup-fees" name="fees" type="number" min="0" step="50" required class="form-input" placeholder="500"></div>
          <div class="grid gap-4 sm:grid-cols-2">
            <div><label class="mb-2 block text-sm text-slate-300" for="doctor-start-time">Start time</label><input id="doctor-start-time" name="start_time" type="time" required class="form-input" value="09:00"></div>
            <div><label class="mb-2 block text-sm text-slate-300" for="doctor-end-time">End time</label><input id="doctor-end-time" name="end_time" type="time" required class="form-input" value="17:00"></div>
          </div>
          <div><label class="mb-2 block text-sm text-slate-300" for="doctor-slot-duration">Slot duration (minutes)</label><input id="doctor-slot-duration" name="slot_duration" type="number" min="10" step="5" required class="form-input" value="30"></div>
          <div><label class="mb-2 block text-sm text-slate-300" for="doctor-signup-email">Doctor email</label><input id="doctor-signup-email" name="email" type="email" required class="form-input" placeholder="doctor@example.com"></div>
          <div><label class="mb-2 block text-sm text-slate-300" for="doctor-signup-password">Password</label><input id="doctor-signup-password" name="password" type="password" required class="form-input" placeholder="Create a password"></div>
          <button type="submit" class="btn-primary w-full justify-center">Create doctor account</button>
        </form>
      </section>
    </div>
  </main>
  <div id="toast-container" class="pointer-events-none fixed right-4 top-4 z-50 flex w-full max-w-sm flex-col gap-3"></div>
  <script type="module" src="../js/app.js"></script>
</body>
</html>
